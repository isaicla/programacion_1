<html>
    <head>
         <meta charset="utf-8"/>
         <title>POCKET MONSTER</title>
         <script src="hola.js"></script>
         <link rel="stylesheet" href="hola.css">
    </head>
    <body>

        <section id="seleccionar-mascota">
         <h1 class="titulo">POCKET MONSTER</h1>
         <h2 class="suptitulo">Elige tu mascota:</h2>

            <div class="tarjetas">
                 <label class="tarjeta-de-pokemon" for="luffy">
                   <p>Luffy</p>
                   <img src="./holafotos/luffy.jpg" alt="Luffy">
                 </label>
                 <input type="radio" name="mascota" id="luffy">

                 <label class="tarjeta-de-pokemon" for="zoro">
                   <p>Zoro</p>
                   <img src="./holafotos/zoro.jpg" alt="Zoro">
                 </label>
                 <input type="radio" name="mascota" id="zoro">

                 <label class="tarjeta-de-pokemon" for="sanji">
                   <p>Sanji</p>
                   <img src="./holafotos/sanji.jpg" alt="Sanji">
                 </label>
                 <input type="radio" name="mascota" id="sanji">
            </div>

            <button id="boton-mascota" class="seleccionar-mascota">Seleccionar</button>
        </section>

        <section id="seleccionar-ataque">
            <h1 class="titulo">POCKET MONSTER</h1>
            <h2 class="suptitulo">Elige tu ataque:</h2>

            <div class="botones-ataque">
                <button id="boton-rallo" class="boton-de-ataque">Rayo ⚡</button>
                <button id="boton-fuego" class="boton-de-ataque">Fuego 🔥</button>
                <button id="boton-planta" class="boton-de-ataque">Planta 🌵</button>
            </div>

            <section id="mensajes"></section>

            <div class="info-vidas">
                <p>Tu mascota <span id="mascota-jugador"></span> tiene <span id="vidas-jugador">3</span> vidas</p>
                <p>La mascota de la computadora <span id="mascota-computadora"></span> tiene <span id="vidas-computadora">3</span> vidas</p>
            </div>

            <section id="reiniciar">
                <button id="boton-reiniciar">Reiniciar</button>
            </section>
        </section>
    </body>
</html>
